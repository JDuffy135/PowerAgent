display_unit: lb
db_path: data/training.db
chroma_path: data/chroma
# LangGraph checkpointer DB -- separate file from training.db by decision, so
# interrupt/resume state never mixes with domain data.
checkpoints_db: data/checkpoints.db

# Per-node model routing (ARCHITECTURE.md §6.3). Each node in the agent graph
# fetches its model via src.agent.llm_provider (get_llm for raw structured
# output, get_chat_model for LangChain chat models) so switching a node to a
# cloud provider is a config edit, not a code change.
nodes:
  ingest_extract:
    provider: local
    model: qwen3:14b
    host: http://localhost:11434
  ingest_correct:
    provider: local
    model: qwen3:14b
    host: http://localhost:11434
  ingest_embed:
    provider: local
    model: nomic-embed-text
    host: http://localhost:11434
  router:
    provider: local
    model: qwen3:14b
    host: http://localhost:11434
  chitchat:
    provider: local
    model: qwen3:14b
    host: http://localhost:11434
  # ANALYZE + SYNTHESIZE run the deeper-reasoning MoE (ARCHITECTURE.md §6.2).
  # [DECISION] Qwen3.6 35B-A3B; step down to qwen3:14b if latency bottlenecks.
  # Cloud-flippable in Stage 7 (change provider -> cloud).
  analyze:
    provider: local
    model: qwen3.6:35b-a3b
    host: http://localhost:11434
  synthesize:
    provider: local
    model: qwen3.6:35b-a3b
    host: http://localhost:11434
  # UPDATE_STATS stays on the 14B workhorse (structured single-fact parse).
  update_stats:
    provider: local
    model: qwen3:14b
    host: http://localhost:11434
  # GENERATE is the heaviest reasoning in the system (ARCHITECTURE.md §4.2).
  # [DECISION] Cloud offload by default: Anthropic claude-sonnet-5, key read
  # from the env var named by api_key_env (never required for local nodes).
  # Flip provider -> local (e.g. qwen3.6:35b-a3b + host) to keep it on-box.
  generate:
    provider: cloud
    model: claude-sonnet-5
    api_key_env: ANTHROPIC_API_KEY
