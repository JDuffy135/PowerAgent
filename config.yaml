display_unit: lb
db_path: data/training.db

# Per-node model routing (ARCHITECTURE.md §6.3). Each node in the agent graph
# fetches its model via src.ingest.extract.get_llm(node) (or the future
# src.agent.llm_provider equivalent) so switching a node to a cloud provider
# is a config edit, not a code change.
nodes:
  ingest_extract:
    provider: local
    model: qwen3:14b
    host: http://localhost:11434

